<!DOCTYPE html>
<html>
<head>
    <title>Simple Prediction App</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, select { padding: 8px; margin: 10px 0; width: 200px; }
        button { padding: 10px; }
    </style>
</head>
<body>

<h2>Enter Details</h2>

<form action="/predict" method="POST">
    <label>Age:</label><br>
    <input type="number" name="age" required><br>

    <label>Salary:</label><br>
    <input type="number" name="salary" required><br>

    <label>City:</label><br>
    <select name="city">
        <option value="city_NewYork">New York</option>
        <option value="city_Lahore">Lahore</option>
        <option value="city_Karachi">Karachi</option>
    </select><br>

    <button type="submit">Predict</button>
</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
